services:
  mongo:
    image: mongo:7
    container_name: eduelderly-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - eduelderly-net

  redis:
    image: redis:7-alpine
    container_name: eduelderly-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - eduelderly-net

  gateway:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.dev
      args:
        SERVICE_DIR: gateway
    container_name: eduelderly-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./services/gateway:/app
      - /app/node_modules
      - ./packages/shared:/app/node_modules/@eduelderly/shared
    env_file:
      - ./services/gateway/.env
    depends_on:
      - mongo
    networks:
      - eduelderly-net

  auth:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.dev
      args:
        SERVICE_DIR: auth
    container_name: eduelderly-auth
    volumes:
      - ./services/auth:/app
      - /app/node_modules
      - ./packages/shared:/app/node_modules/@eduelderly/shared
    env_file:
      - ./services/auth/.env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongo
      - redis
    networks:
      - eduelderly-net

  user:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.dev
      args:
        SERVICE_DIR: user
    container_name: eduelderly-user
    volumes:
      - ./services/user:/app
      - /app/node_modules
      - ./packages/shared:/app/node_modules/@eduelderly/shared
    env_file:
      - ./services/user/.env
    depends_on:
      - mongo
    networks:
      - eduelderly-net

  course:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.dev
      args:
        SERVICE_DIR: course
    container_name: eduelderly-course
    volumes:
      - ./services/course:/app
      - /app/node_modules
      - ./packages/shared:/app/node_modules/@eduelderly/shared
    env_file:
      - ./services/course/.env
    depends_on:
      - mongo
    networks:
      - eduelderly-net

  enrollment:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.dev
      args:
        SERVICE_DIR: enrollment
    container_name: eduelderly-enrollment
    volumes:
      - ./services/enrollment:/app
      - /app/node_modules
      - ./packages/shared:/app/node_modules/@eduelderly/shared
    env_file:
      - ./services/enrollment/.env
    depends_on:
      - mongo
    networks:
      - eduelderly-net

  quiz:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.dev
      args:
        SERVICE_DIR: quiz
    container_name: eduelderly-quiz
    volumes:
      - ./services/quiz:/app
      - /app/node_modules
      - ./packages/shared:/app/node_modules/@eduelderly/shared
    env_file:
      - ./services/quiz/.env
    depends_on:
      - mongo
    networks:
      - eduelderly-net

  payment:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.dev
      args:
        SERVICE_DIR: payment
    container_name: eduelderly-payment
    volumes:
      - ./services/payment:/app
      - /app/node_modules
      - ./packages/shared:/app/node_modules/@eduelderly/shared
    env_file:
      - ./services/payment/.env
    depends_on:
      - mongo
    networks:
      - eduelderly-net

  notification:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.dev
      args:
        SERVICE_DIR: notification
    container_name: eduelderly-notification
    volumes:
      - ./services/notification:/app
      - /app/node_modules
      - ./packages/shared:/app/node_modules/@eduelderly/shared
    env_file:
      - ./services/notification/.env
    depends_on:
      - mongo
    networks:
      - eduelderly-net

  admin:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.dev
      args:
        SERVICE_DIR: admin
    container_name: eduelderly-admin
    volumes:
      - ./services/admin:/app
      - /app/node_modules
      - ./packages/shared:/app/node_modules/@eduelderly/shared
    env_file:
      - ./services/admin/.env
    depends_on:
      - mongo
    networks:
      - eduelderly-net

  certificate:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.dev
      args:
        SERVICE_DIR: certificate
    container_name: eduelderly-certificate
    volumes:
      - ./services/certificate:/app
      - /app/node_modules
      - ./packages/shared:/app/node_modules/@eduelderly/shared
    env_file:
