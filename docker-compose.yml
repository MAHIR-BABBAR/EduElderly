services:
  mongo:
    image: mongo:7
    container_name: eduelderly-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - eduelderly-net

  gateway:
    build:
      context: .
      dockerfile: ./services/gateway/Dockerfile.dev
    container_name: eduelderly-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./services/gateway:/app
      - /app/node_modules
      - ./packages/shared:/app/node_modules/@eduelderly/shared
    env_file:
      - ./services/gateway/.env
    depends_on:
      - mongo
    networks:
      - eduelderly-net

  auth:
    build:
      context: .
      dockerfile: ./services/auth/Dockerfile.dev
    container_name: eduelderly-auth
    volumes:
      - ./services/auth:/app
      - /app/node_modules
      - ./packages/shared:/app/node_modules/@eduelderly/shared
    env_file:
      - ./services/auth/.env
    depends_on:
      - mongo
    networks:
      - eduelderly-net

  user:
    build:
      context: .
      dockerfile: ./services/user/Dockerfile.dev
    container_name: eduelderly-user
    volumes:
      - ./services/user:/app
      - /app/node_modules
      - ./packages/shared:/app/node_modules/@eduelderly/shared
    env_file:
      - ./services/user/.env
    depends_on:
      - mongo
    networks:
      - eduelderly-net

  course:
    build:
      context: .
      dockerfile: ./services/course/Dockerfile.dev
    container_name: eduelderly-course
    volumes:
      - ./services/course:/app
      - /app/node_modules
      - ./packages/shared:/app/node_modules/@eduelderly/shared
    env_file:
