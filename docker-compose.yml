      context: .
      dockerfile: ./services/enrollment/Dockerfile.dev
    container_name: eduelderly-enrollment
    volumes:
      - ./services/enrollment:/app
      - /app/node_modules
      - ./packages/shared:/app/node_modules/@eduelderly/shared
    env_file:
      - ./services/enrollment/.env
    depends_on:
      - mongo
    networks:
      - eduelderly-net

  quiz:
    build:
      context: .
      dockerfile: ./services/quiz/Dockerfile.dev
    container_name: eduelderly-quiz
    volumes:
      - ./services/quiz:/app
      - /app/node_modules
