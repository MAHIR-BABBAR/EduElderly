    depends_on:
      - mongo
    networks:
      - eduelderly-net

  notification:
    build:
      context: .
      dockerfile: ./services/notification/Dockerfile.dev
    container_name: eduelderly-notification
    volumes:
      - ./services/notification:/app
      - /app/node_modules
