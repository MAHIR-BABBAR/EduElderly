services:
  mongo:
    image: mongo:7
    container_name: eduelderly-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - eduelderly-net

  redis:
    image: redis:7-alpine
    container_name: eduelderly-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - eduelderly-net

  gateway:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.dev
      args:
        SERVICE_DIR: gateway
    container_name: eduelderly-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./services/gateway:/app
      - /app/node_modules
      - ./packages/shared:/app/node_modules/@eduelderly/shared
    env_file:
      - ./services/gateway/.env
    environment:
      AUTH_SERVICE_URL: http://auth:3001
      USER_SERVICE_URL: http://user:3002
      COURSE_SERVICE_URL: http://course:3003
      ENROLLMENT_SERVICE_URL: http://enrollment:3004
      QUIZ_SERVICE_URL: http://quiz:3005
      PAYMENT_SERVICE_URL: http://payment:3006
      NOTIFICATION_SERVICE_URL: http://notification:3007
      ADMIN_SERVICE_URL: http://admin:3008
      CERTIFICATE_SERVICE_URL: http://certificate:3009
    depends_on:
      - mongo
    networks:
      - eduelderly-net

  auth:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.dev
      args:
        SERVICE_DIR: auth
    container_name: eduelderly-auth
    volumes:
      - ./services/auth:/app
      - /app/node_modules
      - ./packages/shared:/app/node_modules/@eduelderly/shared
    env_file:
      - ./services/auth/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/eduelderly-auth
      REDIS_URL: redis://redis:6379
      NOTIFICATION_SERVICE_URL: http://notification:3007
      USER_SERVICE_URL: http://user:3002
      GATEWAY_TRUST_ENFORCED: "true"
    depends_on:
      - mongo
      - redis
    networks:
      - eduelderly-net

  user:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.dev
      args:
        SERVICE_DIR: user
    container_name: eduelderly-user
    volumes:
      - ./services/user:/app
      - /app/node_modules
      - ./packages/shared:/app/node_modules/@eduelderly/shared
    env_file:
      - ./services/user/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/eduelderly-user
      GATEWAY_TRUST_ENFORCED: "true"
    depends_on:
      - mongo
    networks:
      - eduelderly-net

  course:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.dev
      args:
        SERVICE_DIR: course
    container_name: eduelderly-course
    volumes:
      - ./services/course:/app
      - /app/node_modules
      - ./packages/shared:/app/node_modules/@eduelderly/shared
    env_file:
      - ./services/course/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/eduelderly-course
      GATEWAY_TRUST_ENFORCED: "true"
    depends_on:
      - mongo
    networks:
      - eduelderly-net

  enrollment:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.dev
      args:
        SERVICE_DIR: enrollment
    container_name: eduelderly-enrollment
    volumes:
      - ./services/enrollment:/app
      - /app/node_modules
      - ./packages/shared:/app/node_modules/@eduelderly/shared
    env_file:
      - ./services/enrollment/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/eduelderly-enrollment
      COURSE_SERVICE_URL: http://course:3003
      USER_SERVICE_URL: http://user:3002
      PAYMENT_SERVICE_URL: http://payment:3006
      NOTIFICATION_SERVICE_URL: http://notification:3007
      CERTIFICATE_SERVICE_URL: http://certificate:3009
      GATEWAY_TRUST_ENFORCED: "true"
    depends_on:
      - mongo
    networks:
      - eduelderly-net

  quiz:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.dev
      args:
        SERVICE_DIR: quiz
    container_name: eduelderly-quiz
    volumes:
      - ./services/quiz:/app
      - /app/node_modules
      - ./packages/shared:/app/node_modules/@eduelderly/shared
    env_file:
      - ./services/quiz/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/eduelderly-quiz
      ENROLLMENT_SERVICE_URL: http://enrollment:3004
      GATEWAY_TRUST_ENFORCED: "true"
    depends_on:
      - mongo
    networks:
      - eduelderly-net

  payment:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.dev
      args:
        SERVICE_DIR: payment
    container_name: eduelderly-payment
    volumes:
      - ./services/payment:/app
      - /app/node_modules
      - ./packages/shared:/app/node_modules/@eduelderly/shared
    env_file:
      - ./services/payment/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/eduelderly-payment
      ENROLLMENT_SERVICE_URL: http://enrollment:3004
      MOCK_CHECKOUT_BASE_URL: http://localhost:5173/#order-pending
      GATEWAY_TRUST_ENFORCED: "true"
    depends_on:
      - mongo
    networks:
      - eduelderly-net

  notification:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.dev
      args:
        SERVICE_DIR: notification
    container_name: eduelderly-notification
    volumes:
      - ./services/notification:/app
      - /app/node_modules
      - ./packages/shared:/app/node_modules/@eduelderly/shared
    env_file:
      - ./services/notification/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/eduelderly-notification
      GATEWAY_TRUST_ENFORCED: "true"
    depends_on:
      - mongo
    networks:
      - eduelderly-net

  admin:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.dev
      args:
        SERVICE_DIR: admin
    container_name: eduelderly-admin
    volumes:
      - ./services/admin:/app
      - /app/node_modules
      - ./packages/shared:/app/node_modules/@eduelderly/shared
    env_file:
      - ./services/admin/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/eduelderly-admin
      USER_SERVICE_URL: http://user:3002
      COURSE_SERVICE_URL: http://course:3003
      ENROLLMENT_SERVICE_URL: http://enrollment:3004
      PAYMENT_SERVICE_URL: http://payment:3006
      CERTIFICATE_SERVICE_URL: http://certificate:3009
      GATEWAY_TRUST_ENFORCED: "true"
    depends_on:
      - mongo
    networks:
      - eduelderly-net

  certificate:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.dev
      args:
        SERVICE_DIR: certificate
    container_name: eduelderly-certificate
    volumes:
      - ./services/certificate:/app
      - /app/node_modules
      - ./packages/shared:/app/node_modules/@eduelderly/shared
    env_file:
      - ./services/certificate/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/eduelderly-certificate
      GATEWAY_TRUST_ENFORCED: "true"
    depends_on:
      - mongo
    networks:
      - eduelderly-net

networks:
  eduelderly-net:
    driver: bridge

volumes:
  mongo-data:
